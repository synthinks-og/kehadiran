<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Rekap Kehadiran</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>

</head>

<body>

<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">

    <h1>Rekap Kehadiran</h1>

    <div class="actions">

<input
  type="text"
  id="newName"
  placeholder="Tambah nama"
  onkeydown="
    if(event.key === 'Enter'){
      addName()
    }
  "
>

      <button onclick="addName()">
        Tambah
      </button>

      <button onclick="exportExcel()">
        Export Excel
      </button>

    </div>

  </div>

  <!-- TABEL -->
  <div class="table-container">

    <table id="attendanceTable">

      <thead>

        <tr id="headerRow">

          <th>NAMA</th>

        </tr>

      </thead>

      <tbody id="tableBody"></tbody>

    </table>

  </div>

  <!-- FOOTER -->
  <footer class="footer">

    © 2026

    <a
      href="https://instagram.com/synthinks_"
      target="_blank"
    >
      @Synthinks Creative
    </a>

  </footer>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
